<div class="login-wrapper">
  <div class="login-card">

    <!-- Header with gradient -->
    <div class="login-header">
      <div class="logo-box">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="white">
          <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
        </svg>
      </div>
      <h1>Smart Travel</h1>
      <p>Inicia sesión en tu cuenta</p>
    </div>

    <!-- Form -->
    <div class="login-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <!-- Email -->
        <div class="field-group">
          <label>Correo electronico</label>
          <div class="input-box" [class.input-error]="form.get('email')?.invalid && form.get('email')?.touched">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input
              type="email"
              formControlName="email"
              placeholder="ejemplo@correo.com"/>
          </div>
          @if (form.get('email')?.invalid && form.get('email')?.touched) {
            <span class="error-msg">{{ getEmailError() }}</span>
          }
        </div>

        <!-- Password -->
        <div class="field-group">
          <label>Contraseña</label>
          <div class="input-box" [class.input-error]="form.get('password')?.invalid && form.get('password')?.touched">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              [type]="hidePassword ? 'password' : 'text'"
              formControlName="password"
              placeholder="••••••••"/>
            <button type="button" class="toggle-pass" (click)="hidePassword = !hidePassword">
              @if (hidePassword) {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
          @if (form.get('password')?.invalid && form.get('password')?.touched) {
            <span class="error-msg">{{ getPasswordError() }}</span>
          }
        </div>

        <!-- Button -->
        <button type="submit" class="btn-login" [disabled]="loading">
          @if (loading) {
            <span class="spinner"></span>
          } @else {
            Iniciar sesión
          }
        </button>

      </form>

      <p class="register-link">
        ¿No tienes cuenta?
        <a routerLink="/auth/register">Regístrate aquí</a>
      </p>
    </div>

  </div>
</div>
